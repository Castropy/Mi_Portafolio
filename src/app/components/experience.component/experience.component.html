<section class="experience-section">
  <h2 class="section-title">Proyectos y Experiencia</h2>

  <div class="projects-grid">
    @for (project of projects(); track project.name) {
      <div class="project-card glass-card">
        <div class="project-image" [class.mobile-frame]="project.type === 'Flutter'">
          <img [src]="project.images[0].url" [alt]="project.images[0].alt">
          <span class="project-type">{{ project.type }}</span>
        </div>

        <div class="project-info">
          <h3>{{ project.name }}</h3>
          <p>{{ project.description }}</p>
          
          <div class="tech-stack">
            @for (tech of project.techStack; track tech) {
              <span class="tech-tag">{{ tech }}</span>
            }
          </div>

          <a [href]="project.githubUrl" target="_blank" class="github-link">
            Ver en GitHub <i class="bi bi-github"></i>
          </a>
          <a [href]="project.playStoreUrl" target="_blank" class="playstore-link">
            Ver en Play Store <i class="bi bi-play-store"></i>
          </a>
        </div>
      </div>
    }
  </div>
</section>
